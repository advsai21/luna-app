<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b1f6e"/>
    </radialGradient>
    <radialGradient id="glowOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0d4ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGlow)"/>

  <!-- Outer moon glow -->
  <circle cx="185" cy="195" r="130" fill="url(#glowOuter)"/>

  <!-- Moon body -->
  <circle cx="185" cy="195" r="100" fill="url(#moonGrad)" filter="url(#softGlow)"/>

  <!-- Crescent cutout using a circle to create crescent shape -->
  <circle cx="225" cy="178" r="88" fill="#0d0820"/>

  <!-- Subtle moon surface texture dots -->
  <circle cx="148" cy="220" r="6" fill="#5b21b6" opacity="0.4"/>
  <circle cx="162" cy="240" r="4" fill="#4c1d95" opacity="0.3"/>
  <circle cx="140" cy="200" r="8" fill="#6d28d9" opacity="0.25"/>
  <circle cx="155" cy="175" r="5" fill="#5b21b6" opacity="0.35"/>

  <!-- Stars - large ones -->
  <!-- Star 1 - top right bright -->
  <g filter="url(#starFilter)">
    <polygon points="295,85 299,97 312,97 302,105 306,117 295,109 284,117 288,105 278,97 291,97" fill="url(#starGlow)" opacity="0.95"/>
  </g>

  <!-- Star 2 - small top center -->
  <g filter="url(#starFilter)">
    <polygon points="195,55 197,62 204,62 198,67 200,74 195,69 190,74 192,67 186,62 193,62" fill="#c4b5fd" opacity="0.85"/>
  </g>

  <!-- Star 3 - bottom right -->
  <g filter="url(#starFilter)">
    <polygon points="310,270 313,279 322,279 315,285 318,294 310,288 302,294 305,285 298,279 307,279" fill="#a78bfa" opacity="0.9"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="260" cy="120" r="3" fill="#e0d4ff" opacity="0.9" filter="url(#starFilter)"/>
  <circle cx="330" cy="160" r="2.5" fill="#c4b5fd" opacity="0.8" filter="url(#starFilter)"/>
  <circle cx="340" cy="230" r="2" fill="#a78bfa" opacity="0.7"/>
  <circle cx="280" cy="310" r="2.5" fill="#c4b5fd" opacity="0.75" filter="url(#starFilter)"/>
  <circle cx="120" cy="100" r="2" fill="#e0d4ff" opacity="0.6"/>
  <circle cx="100" cy="280" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="350" cy="310" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="240" cy="50" r="1.5" fill="#e0d4ff" opacity="0.7"/>
  <circle cx="80" cy="180" r="1.5" fill="#a78bfa" opacity="0.4"/>

  <!-- Tiny cross sparkles -->
  <g opacity="0.8" filter="url(#starFilter)">
    <line x1="260" y1="117" x2="260" y2="123" stroke="#e0d4ff" stroke-width="1.5"/>
    <line x1="257" y1="120" x2="263" y2="120" stroke="#e0d4ff" stroke-width="1.5"/>
  </g>
  <g opacity="0.6" filter="url(#starFilter)">
    <line x1="330" y1="157" x2="330" y2="163" stroke="#c4b5fd" stroke-width="1"/>
    <line x1="327" y1="160" x2="333" y2="160" stroke="#c4b5fd" stroke-width="1"/>
  </g>

  <!-- Luna text -->
  <text x="200" y="358" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="300" font-style="italic" fill="url(#moonGrad)" text-anchor="middle" letter-spacing="8" filter="url(#softGlow)">Luna</text>

  <!-- Subtle underline accent -->
  <line x1="148" y1="368" x2="252" y2="368" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
</svg>
